name: Release

# Push a tag like v1.0.0 to publish a GitHub Release. GitHub attaches the source
# archives (zip/tar.gz) automatically — that zip is what users download and run
# the installer from.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Publish release
        # Third-party action pinned to a full commit SHA (immutable), per
        # supply-chain best practice; the comment tracks the human-readable tag.
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          generate_release_notes: true
