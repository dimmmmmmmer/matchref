name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  # Lint and type-check run once, on the minimum supported interpreter (3.10):
  # ruff targets py310, and mypy checks against the running interpreter, so this
  # job enforces minimum-version semantics without repeating per matrix version.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff (lint)
        run: ruff check .

      - name: Ruff (format)
        run: ruff format --check .

      - name: Mypy (type check)
        run: mypy

  # MatchRef requires Python >=3.10; run the tests across the supported range so
  # a version-specific break (e.g. the old zip(strict=) 3.9 failure) is caught.
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Pytest
        run: pytest -q
