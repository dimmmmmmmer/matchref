name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  # Lint and type-check run once, on the minimum supported interpreter (3.10):
  # ruff targets py310, and mypy checks against the running interpreter, so this
  # job enforces minimum-version semantics without repeating per matrix version.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff (lint)
        run: ruff check .

      - name: Ruff (format)
        run: ruff format --check .

      - name: Mypy (type check)
        run: mypy

  # MatchRef requires Python >=3.10; run the tests across the supported range so
  # a version-specific break (e.g. the old zip(strict=) 3.9 failure) is caught.
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # PySide6 needs GL/EGL system libraries even for the offscreen platform
      # used by the GUI smoke test (tests/test_gui_smoke.py).
      - name: Install Qt system libraries
        run: sudo apt-get update && sudo apt-get install -y libegl1 libgl1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Pytest
        run: pytest -q

  # Users install on macOS and Windows; one Windows leg catches platform breaks
  # (path handling, PySide6 wheels) that the Ubuntu matrix can't see.
  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Pytest
        run: pytest -q

  # Measure test coverage once (3.12) and publish it to Codacy so the dashboard
  # coverage metric/badge reflects reality.
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Qt system libraries
        run: sudo apt-get update && sudo apt-get install -y libegl1 libgl1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt coverage

      - name: Pytest with coverage
        run: |
          coverage run -m pytest -q
          coverage xml
          coverage report | tail -1

      - name: Upload coverage to Codacy
        # Third-party action pinned to a full commit SHA (immutable); the
        # comment tracks the human-readable tag.
        uses: codacy/codacy-coverage-reporter-action@89d6c85cfafaec52c72b6c5e8b2878d33104c699 # v1
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          coverage-reports: coverage.xml
