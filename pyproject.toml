[tool.ruff]
target-version = "py310"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "C4"]
ignore = [
    "E501",    # line length is handled by the formatter, not enforced hard
    "B008",    # function calls in arg defaults — common in Qt/CLI wiring
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["E402"]
